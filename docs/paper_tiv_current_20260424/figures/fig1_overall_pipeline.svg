<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .title { font: 700 30px 'DejaVu Sans', Arial, sans-serif; fill: #11243a; }
      .subtitle { font: 600 18px 'DejaVu Sans', Arial, sans-serif; fill: #39506b; }
      .label { font: 600 20px 'DejaVu Sans', Arial, sans-serif; fill: #14263d; }
      .small { font: 500 16px 'DejaVu Sans', Arial, sans-serif; fill: #29405c; }
      .tiny { font: 500 14px 'DejaVu Sans', Arial, sans-serif; fill: #425b78; }
      .box { fill: #f8fbff; stroke: #29405c; stroke-width: 2.5; rx: 22; ry: 22; }
      .blue { fill: #dceeff; stroke: #2b6cb0; }
      .green { fill: #dff5e8; stroke: #2f855a; }
      .orange { fill: #fff0d9; stroke: #c47a19; }
      .red { fill: #fde4e4; stroke: #c05656; }
      .gray { fill: #eef3f8; stroke: #5c7189; }
      .arrow { stroke: #1d3557; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#1d3557"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="1564" height="884" rx="28" ry="28" fill="#ffffff" stroke="#d6e0ea" stroke-width="2"/>
  <text x="60" y="72" class="title">Fig. 1. Overall pipeline of the current communication-consistent risk-aware GNN-MAPPO.</text>
  <text x="60" y="104" class="subtitle">The workflow couples aligned curriculum training, structured observations, graph-enhanced actor inference, and test-time protocol consistency.</text>

  <rect x="60" y="150" width="300" height="690" class="box gray"/>
  <text x="88" y="192" class="label">A. Curriculum Environment</text>
  <rect x="88" y="220" width="244" height="108" class="box blue"/>
  <text x="108" y="252" class="label">Stage 1</text>
  <text x="108" y="281" class="small">map 5, 0 dynamic obstacles</text>
  <text x="108" y="307" class="small">smooth target following</text>

  <rect x="88" y="348" width="244" height="108" class="box green"/>
  <text x="108" y="380" class="label">Stage 2</text>
  <text x="108" y="409" class="small">map 3, 2 dynamic obstacles</text>
  <text x="108" y="435" class="small">light conflict pressure</text>

  <rect x="88" y="476" width="244" height="108" class="box orange"/>
  <text x="108" y="508" class="label">Stage 3</text>
  <text x="108" y="537" class="small">map 3, 6 obstacles, speed 0.9</text>
  <text x="108" y="563" class="small">frequent merge and swap conflicts</text>

  <rect x="88" y="604" width="244" height="140" class="box red"/>
  <text x="108" y="636" class="label">Stage 4</text>
  <text x="108" y="665" class="small">map 3, 8 obstacles, speed 1.3</text>
  <text x="108" y="691" class="small">dense dynamic interference</text>
  <text x="108" y="717" class="small">final robustness target</text>
  <text x="88" y="790" class="tiny">Training and testing scripts use the same stage table.</text>

  <rect x="420" y="150" width="380" height="690" class="box"/>
  <text x="448" y="192" class="label">B. Observation and Local Conflict Cues</text>
  <rect x="448" y="220" width="324" height="78" class="box blue"/>
  <text x="472" y="252" class="small">scan history + goal pose + ego velocity</text>
  <text x="472" y="278" class="small">base safety and predictive risk features</text>

  <rect x="448" y="318" width="324" height="78" class="box green"/>
  <text x="472" y="350" class="small">gap features</text>
  <text x="472" y="376" class="small">best gap angle, width, clearance</text>

  <rect x="448" y="416" width="324" height="78" class="box orange"/>
  <text x="472" y="448" class="small">neighbor prediction tokens</text>
  <text x="472" y="474" class="small">relative position, approach, TTC, risk</text>

  <rect x="448" y="514" width="324" height="112" class="box red"/>
  <text x="472" y="546" class="small">environment-side conflict handlers</text>
  <text x="472" y="572" class="small">yielding hold, detour subgoal, deadlock replan</text>
  <text x="472" y="598" class="small">risk-aware forward penalty, safe-turn reward</text>

  <rect x="448" y="646" width="324" height="134" class="box gray"/>
  <text x="472" y="678" class="small">communication-consistent setup</text>
  <text x="472" y="704" class="small">neighbor graph during training uses</text>
  <text x="472" y="730" class="small">perfect communication:</text>
  <text x="472" y="756" class="small">dropout 0, latency 0, jitter 0, noise 0</text>

  <rect x="860" y="150" width="360" height="690" class="box"/>
  <text x="888" y="192" class="label">C. Policy Optimization</text>
  <rect x="888" y="220" width="304" height="96" class="box blue"/>
  <text x="912" y="252" class="small">Decentralized actor</text>
  <text x="912" y="278" class="small">MLP-compatible LSTM trunk</text>
  <text x="912" y="304" class="small">plus graph-enhanced side branch</text>

  <rect x="888" y="338" width="304" height="96" class="box green"/>
  <text x="912" y="370" class="small">Centralized critic</text>
  <text x="912" y="396" class="small">global state to MLP critic</text>
  <text x="912" y="422" class="small">optional GAT critic for ablations</text>

  <rect x="888" y="456" width="304" height="96" class="box orange"/>
  <text x="912" y="488" class="small">PPO with curriculum-stage scheduling</text>
  <text x="912" y="514" class="small">conservative clip and entropy settings</text>
  <text x="912" y="540" class="small">aligned checkpoints per stage</text>

  <rect x="888" y="574" width="304" height="172" class="box red"/>
  <text x="912" y="606" class="small">Optimization targets</text>
  <text x="912" y="632" class="small">goal progress, collision penalty</text>
  <text x="912" y="658" class="small">subgoal progress, yield compliance</text>
  <text x="912" y="684" class="small">risk-aware forward penalty</text>
  <text x="912" y="710" class="small">safe-turn reward, team reward</text>

  <rect x="1280" y="150" width="250" height="690" class="box"/>
  <text x="1308" y="192" class="label">D. Evaluation</text>
  <rect x="1308" y="220" width="194" height="110" class="box blue"/>
  <text x="1330" y="252" class="small">run_test.sh</text>
  <text x="1330" y="278" class="small">loads checkpoint config</text>
  <text x="1330" y="304" class="small">overrides only stage map/obs</text>

  <rect x="1308" y="352" width="194" height="118" class="box green"/>
  <text x="1330" y="384" class="small">same stage table as training</text>
  <text x="1330" y="410" class="small">same map, obstacle count</text>
  <text x="1330" y="436" class="small">same obstacle speed scale</text>

  <rect x="1308" y="492" width="194" height="146" class="box orange"/>
  <text x="1330" y="524" class="small">checkpoint semantics preserved</text>
  <text x="1330" y="550" class="small">shield follows checkpoint unless</text>
  <text x="1330" y="576" class="small">explicitly overridden</text>
  <text x="1330" y="602" class="small">auto_reset can also be preserved</text>

  <rect x="1308" y="660" width="194" height="120" class="box red"/>
  <text x="1330" y="692" class="small">report</text>
  <text x="1330" y="718" class="small">success, collision, steps,</text>
  <text x="1330" y="744" class="small">risk metrics, qualitative cases</text>

  <path d="M360 496 L420 496" class="arrow"/>
  <path d="M800 496 L860 496" class="arrow"/>
  <path d="M1220 496 L1280 496" class="arrow"/>
  <path d="M1405 330 L1405 352" class="arrow dashed"/>
  <path d="M1405 470 L1405 492" class="arrow dashed"/>
  <path d="M1405 638 L1405 660" class="arrow dashed"/>

  <path d="M1220 760 C1270 760, 1270 820, 1110 820 L640 820 C500 820, 500 774, 500 780" class="arrow dashed"/>
  <text x="745" y="860" class="small">checkpoint selection and stage-aligned evaluation close the train-test loop</text>
</svg>
