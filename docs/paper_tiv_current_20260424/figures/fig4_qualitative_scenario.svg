<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .title { font: 700 30px 'DejaVu Sans', Arial, sans-serif; fill: #10243b; }
      .subtitle { font: 600 18px 'DejaVu Sans', Arial, sans-serif; fill: #3c536f; }
      .label { font: 700 20px 'DejaVu Sans', Arial, sans-serif; fill: #17304b; }
      .small { font: 500 16px 'DejaVu Sans', Arial, sans-serif; fill: #2e4865; }
      .tiny { font: 500 14px 'DejaVu Sans', Arial, sans-serif; fill: #49627e; }
      .wall { fill: #dce3ea; stroke: #8798aa; stroke-width: 2; }
      .lane { fill: #f8fbff; stroke: #d5dee8; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #284662; stroke-width: 2.5; rx: 18; ry: 18; }
      .blue { fill: #dceeff; stroke: #2b6cb0; }
      .green { fill: #dff5e8; stroke: #2f855a; }
      .orange { fill: #fff0d9; stroke: #c47a19; }
      .red { fill: #fde4e4; stroke: #c05656; }
      .arrowBlue { stroke: #2b6cb0; stroke-width: 4; fill: none; marker-end: url(#blueArrow); }
      .arrowGreen { stroke: #2f855a; stroke-width: 4; fill: none; marker-end: url(#greenArrow); }
      .arrowOrange { stroke: #c47a19; stroke-width: 4; fill: none; marker-end: url(#orangeArrow); }
      .dash { stroke-dasharray: 10 8; }
    </style>
    <marker id="blueArrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2b6cb0"/>
    </marker>
    <marker id="greenArrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2f855a"/>
    </marker>
    <marker id="orangeArrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#c47a19"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="1564" height="884" rx="28" ry="28" fill="#ffffff" stroke="#d6e0ea" stroke-width="2"/>
  <text x="56" y="72" class="title">Fig. 4. Qualitative interaction illustration in a corridor-swap scenario.</text>
  <text x="56" y="104" class="subtitle">The current version combines communication-consistent relation modeling with gap-aware yielding and detour behaviors.</text>

  <rect x="70" y="150" width="920" height="690" class="box" fill="#fcfdff"/>
  <text x="96" y="192" class="label">Top-down interaction scene</text>

  <rect x="130" y="220" width="800" height="120" class="wall"/>
  <rect x="130" y="650" width="800" height="120" class="wall"/>
  <rect x="130" y="340" width="800" height="310" class="lane"/>
  <line x1="530" y1="340" x2="530" y2="650" stroke="#a9b9ca" stroke-width="3" stroke-dasharray="10 8"/>

  <circle cx="280" cy="440" r="28" fill="#2b6cb0"/>
  <text x="268" y="446" font-family="Arial" font-size="18" fill="#ffffff" font-weight="700">R1</text>
  <path d="M310 440 L430 440" class="arrowBlue"/>

  <circle cx="740" cy="450" r="28" fill="#2f855a"/>
  <text x="728" y="456" font-family="Arial" font-size="18" fill="#ffffff" font-weight="700">R2</text>
  <path d="M710 450 L640 450" class="arrowGreen"/>

  <circle cx="470" cy="550" r="28" fill="#c47a19"/>
  <text x="458" y="556" font-family="Arial" font-size="18" fill="#ffffff" font-weight="700">R3</text>
  <path d="M470 520 C500 500, 550 485, 602 470" class="arrowOrange"/>

  <circle cx="595" cy="405" r="18" fill="#d1495b"/>
  <circle cx="620" cy="555" r="18" fill="#d1495b"/>
  <text x="582" y="388" class="tiny">dynamic obstacle</text>
  <text x="605" y="585" class="tiny">dynamic obstacle</text>

  <path d="M280 440 C380 395, 470 388, 560 405" stroke="#2b6cb0" stroke-width="3" fill="none" stroke-dasharray="9 7"/>
  <path d="M740 450 C700 470, 660 475, 610 475" stroke="#2f855a" stroke-width="3" fill="none" stroke-dasharray="9 7"/>
  <line x1="280" y1="440" x2="740" y2="450" stroke="#d1495b" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="452" y="430" class="tiny">high-risk interaction edge</text>

  <ellipse cx="640" cy="400" rx="62" ry="34" fill="none" stroke="#f4a261" stroke-width="4"/>
  <text x="610" y="404" class="tiny">best gap</text>
  <path d="M742 450 C710 390, 675 365, 645 360" class="arrowGreen dash"/>
  <text x="742" y="386" class="tiny">yield / slow down</text>

  <rect x="1040" y="150" width="490" height="690" class="box"/>
  <text x="1066" y="192" class="label">Behavior interpretation</text>

  <rect x="1066" y="226" width="438" height="104" class="box blue"/>
  <text x="1090" y="260" class="small">1. Communication-consistent neighbor graph</text>
  <text x="1090" y="286" class="small">R1 and R2 exchange structured relation cues under perfect-communication training.</text>
  <text x="1090" y="312" class="small">The GAT branch highlights the highest-risk edge.</text>

  <rect x="1066" y="354" width="438" height="104" class="box green"/>
  <text x="1090" y="388" class="small">2. Gap-aware local passage</text>
  <text x="1090" y="414" class="small">The policy receives gap angle, width, and clearance to prefer a feasible corridor.</text>
  <text x="1090" y="440" class="small">This reduces blind forward pushing.</text>

  <rect x="1066" y="482" width="438" height="128" class="box orange"/>
  <text x="1090" y="516" class="small">3. Yield-aware conflict resolution</text>
  <text x="1090" y="542" class="small">If the conflict is close and TTC is small, the yielding agent holds a slow-down or turn decision</text>
  <text x="1090" y="568" class="small">for several steps instead of oscillating at each frame.</text>
  <text x="1090" y="594" class="small">This is important in narrow corridors.</text>

  <rect x="1066" y="634" width="438" height="154" class="box red"/>
  <text x="1090" y="668" class="small">4. Detour and deadlock recovery</text>
  <text x="1090" y="694" class="small">When the nominal path remains blocked, the environment proposes a local detour subgoal.</text>
  <text x="1090" y="720" class="small">If the deadlock persists, nearby robots become temporary obstacles for local replanning.</text>
  <text x="1090" y="746" class="small">The policy then receives subgoal-progress and safe-turn rewards.</text>

  <text x="150" y="806" class="small">Example narrative for the paper: R2 yields, R1 passes through the safer gap, and R3 follows a side detour while dynamic obstacles cross the corridor.</text>
</svg>
