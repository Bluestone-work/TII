<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860">
  <defs>
    <style>
      .title { font: 700 30px 'DejaVu Sans', Arial, sans-serif; fill: #11243a; }
      .subtitle { font: 600 18px 'DejaVu Sans', Arial, sans-serif; fill: #3d5673; }
      .label { font: 700 20px 'DejaVu Sans', Arial, sans-serif; fill: #17314d; }
      .small { font: 500 16px 'DejaVu Sans', Arial, sans-serif; fill: #2e4968; }
      .tiny { font: 500 14px 'DejaVu Sans', Arial, sans-serif; fill: #4e6986; }
      .box { fill: #f8fbff; stroke: #284662; stroke-width: 2.5; rx: 18; ry: 18; }
      .blue { fill: #dceeff; stroke: #2b6cb0; }
      .green { fill: #dff5e8; stroke: #2f855a; }
      .orange { fill: #fff0d9; stroke: #c47a19; }
      .red { fill: #fde4e4; stroke: #c05656; }
      .gray { fill: #eef3f8; stroke: #6a8199; }
      .arrow { stroke: #17324d; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#17324d"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="1564" height="824" rx="28" ry="28" fill="#ffffff" stroke="#d6e0ea" stroke-width="2"/>
  <text x="56" y="72" class="title">Fig. 3. Curriculum and evaluation protocol of the current version.</text>
  <text x="56" y="104" class="subtitle">Training and testing now share the same stage table and preserve checkpoint semantics.</text>

  <line x1="160" y1="290" x2="1460" y2="290" stroke="#17324d" stroke-width="5"/>
  <path d="M1460 290 L1435 278 L1435 302 z" fill="#17324d"/>

  <rect x="110" y="210" width="280" height="160" class="box blue"/>
  <text x="136" y="246" class="label">Stage 1</text>
  <text x="136" y="276" class="small">warehouse_aisles</text>
  <text x="136" y="302" class="small">map = 5</text>
  <text x="136" y="328" class="small">dynamic obstacles = 0</text>
  <text x="136" y="354" class="small">speed scale = 0.0</text>

  <rect x="430" y="210" width="280" height="160" class="box green"/>
  <text x="456" y="246" class="label">Stage 2</text>
  <text x="456" y="276" class="small">corridor_swap</text>
  <text x="456" y="302" class="small">map = 3</text>
  <text x="456" y="328" class="small">dynamic obstacles = 2</text>
  <text x="456" y="354" class="small">speed scale = 0.35</text>

  <rect x="750" y="210" width="280" height="160" class="box orange"/>
  <text x="776" y="246" class="label">Stage 3</text>
  <text x="776" y="276" class="small">corridor_swap</text>
  <text x="776" y="302" class="small">map = 3</text>
  <text x="776" y="328" class="small">dynamic obstacles = 6</text>
  <text x="776" y="354" class="small">speed scale = 0.9</text>

  <rect x="1070" y="210" width="280" height="160" class="box red"/>
  <text x="1096" y="246" class="label">Stage 4</text>
  <text x="1096" y="276" class="small">corridor_swap</text>
  <text x="1096" y="302" class="small">map = 3</text>
  <text x="1096" y="328" class="small">dynamic obstacles = 8</text>
  <text x="1096" y="354" class="small">speed scale = 1.3</text>

  <rect x="80" y="430" width="700" height="340" class="box"/>
  <text x="108" y="472" class="label">Training Protocol</text>
  <rect x="108" y="500" width="286" height="92" class="box blue"/>
  <text x="128" y="534" class="small">run_curriculum.sh</text>
  <text x="128" y="560" class="small">passes stage map, obstacle count, speed</text>
  <text x="128" y="586" class="small">and output directory to train_gnn_mappo_full.py</text>

  <rect x="430" y="500" width="320" height="92" class="box green"/>
  <text x="450" y="534" class="small">neighbor graph training uses perfect communication</text>
  <text x="450" y="560" class="small">dropout 0, latency 0, jitter 0, noise 0</text>
  <text x="450" y="586" class="small">checkpoint can be resumed stage by stage</text>

  <rect x="108" y="622" width="642" height="116" class="box orange"/>
  <text x="128" y="656" class="small">Environment-side structure learning</text>
  <text x="128" y="682" class="small">gap features + yielding hold + local detour subgoal + dynamic replan</text>
  <text x="128" y="708" class="small">combined with risk-aware rewards and continuous task flow</text>

  <rect x="840" y="430" width="680" height="340" class="box"/>
  <text x="868" y="472" class="label">Evaluation Protocol</text>
  <rect x="868" y="500" width="624" height="92" class="box blue"/>
  <text x="888" y="534" class="small">run_test.sh uses the same stage table as training</text>
  <text x="888" y="560" class="small">map_number, num_dynamic_obstacles, and obs_speed are overridden to current test stage</text>
  <text x="888" y="586" class="small">this removes the old shell-versus-python curriculum drift</text>

  <rect x="868" y="622" width="302" height="116" class="box green"/>
  <text x="888" y="656" class="small">Preserved by default</text>
  <text x="888" y="682" class="small">auto_reset_agents</text>
  <text x="888" y="708" class="small">shield configuration</text>

  <rect x="1190" y="622" width="302" height="116" class="box orange"/>
  <text x="1210" y="656" class="small">Optional overrides</text>
  <text x="1210" y="682" class="small">shield parameters</text>
  <text x="1210" y="708" class="small">explore flag</text>

  <path d="M394 546 L430 546" class="arrow"/>
  <path d="M1170 680 L1190 680" class="arrow"/>

  <text x="90" y="166" class="tiny">Difficulty increases from left to right.</text>
  <text x="980" y="808" class="small">Key implication: current train and test flows are protocol-aligned, so poor results are more likely due to policy quality, deterministic evaluation, or checkpoint mismatch.</text>
</svg>
