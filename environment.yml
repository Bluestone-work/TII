name: dgta
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip>=23.0
  - numpy=1.24.3
  - scipy
  - matplotlib
  - pandas
  - seaborn
  - pyyaml
  - tqdm

  - pip:
      - torch
      - torchvision
      - torchaudio
      - gymnasium==0.29.1
      - stable-baselines3==2.1.0
      - tensorboard
      - torch-geometric
      - torch-scatter
      - torch-sparse
      - empy==3.3.4
      - colcon-common-extensions
      - opencv-python
      - pillow
